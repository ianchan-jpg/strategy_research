# 主观策略 vs 量化策略比价项目配置
# 先把可确认的信息写清楚；正式建模前再根据数据检查结果细化。

data:
  # 原始文件保留在项目根目录的 data/factors.xlsx，不覆盖、不移动。
  excel_path: ../data/factors.xlsx

sheets:
  indicator_catalog: 指标目录
  indicator_mapping: 大类指标名称对应
  daily_factors: 日度序列
  weekly_factors: 周度序列
  monthly_factors: 月度序列
  strategy_index: 策略指数

columns:
  date: date
  stock_subjective: 主观-均衡
  stock_quant: 量化-均衡
  cta_subjective: 主观期货
  cta_quant: 量化期货

targets:
  stock: next_stock_quant_minus_subjective
  cta: next_cta_quant_minus_subjective
  # shift_periods=-1 表示用当期因子预测下一期“量化收益 - 主观收益”。
  shift_periods: -1

preprocess:
  winsorize_lower: 0.01
  winsorize_upper: 0.99
  standardize: true

test:
  rank_ic_method: spearman
  rolling_window: 12
  high_corr_threshold: 0.8
